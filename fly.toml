app = "pm-dashboard-hub"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  TZ = "Asia/Shanghai"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 30

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "pm_hub_analytics"
  destination = "/persist"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
