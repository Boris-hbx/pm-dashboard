    // ── UI Comparison ──
    function uiComparisonSection(uc) {
      let h = '';

      // Videos section
      const videos = uc.videos || [];
      if (videos.length > 0) {
        h += '<div class="row row-full"><div class="card"><h2>' + t('App Recordings') + '</h2>';
        h += '<div class="uc-videos">';
        videos.forEach((v, i) => {
          h += '<div class="uc-video-card">';
          if (v.available) {
            h += `<video controls preload="metadata"><source src="/${v.src}" type="video/mp4"></video>`;
          } else {
            h += `<div style="height:200px;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--text3);font-size:0.75rem">${t('Video too large')} (${v.sizeHuman || '?'}), ${t('local only')}</div>`;
          }
          h += `<div class="uc-video-label"><span class="uc-platform ${v.platform}">${v.platform === 'android' ? 'Android' : 'HarmonyOS'}</span>${esc(v.label)}</div>`;
          h += '</div>';
        });
        h += '</div></div></div>';
      }

      // Frame comparisons section
      const cmps = uc.comparisons || [];
      if (cmps.length > 0) {
        const matchCount = cmps.filter(c => c.status === 'match').length;
        const diffCount = cmps.filter(c => c.status === 'diff').length;
        const missingCount = cmps.filter(c => c.status === 'missing' || c.status === 'harmonyos-only').length;
        const avgSim = cmps.filter(c => c.similarity != null);
        const avgSimVal = avgSim.length > 0 ? Math.round(avgSim.reduce((s, c) => s + c.similarity, 0) / avgSim.length) : null;

        h += '<div class="row row-full"><div class="card"><h2>' + t('Frame Comparison') + '</h2>';

        // Summary stats
        h += '<div style="display:flex;gap:1.5rem;margin-bottom:0.8rem;font-size:0.75rem">';
        h += `<span style="color:var(--text2)">${cmps.length} ${t('frames')}</span>`;
        if (avgSimVal != null) {
          const simCls = avgSimVal >= 85 ? 'high' : avgSimVal >= 65 ? 'med' : 'low';
          h += `<span>${t('Avg similarity')}: <span class="uc-similarity ${simCls}">${avgSimVal}%</span></span>`;
        }
        if (diffCount) h += `<span style="color:var(--yellow)">${diffCount} ${t('diff')}</span>`;
        if (missingCount) h += `<span style="color:var(--red)">${missingCount} ${t('missing/extra')}</span>`;
        h += '</div>';

        // Thumbnail grid
        h += '<div class="uc-grid" id="ucGrid">';
        cmps.forEach((c, i) => {
          const thumbSrc = c.android || c.harmonyos;
          const badgeCls = c.status || 'diff';
          const badgeText = c.similarity != null ? c.similarity + '%' : (c.status === 'missing' ? 'N/A' : 'NEW');
          h += `<div class="uc-thumb ${i === 0 ? 'active' : ''}" data-idx="${i}" title="${esc(c.page)}">`;
          if (thumbSrc) h += `<img src="/${thumbSrc}" alt="${esc(c.page)}" loading="lazy">`;
          else h += '<div style="width:100%;height:100%;background:var(--surface2)"></div>';
          h += `<span class="uc-thumb-badge ${badgeCls}">${badgeText}</span>`;
          h += '</div>';
        });
        h += '</div>';

        // Detail area
        h += '<div id="ucDetail"></div>';
        h += '</div></div>';
      }

      return h;
    }

    function bindUIComparisonEvents(uc) {
      const grid = document.getElementById('ucGrid');
      if (!grid) return;

      showComparison(uc, 0);

      grid.querySelectorAll('.uc-thumb').forEach(thumb => {
        thumb.addEventListener('click', () => {
          grid.querySelectorAll('.uc-thumb').forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
          showComparison(uc, parseInt(thumb.dataset.idx));
        });
      });
    }

    let _currentUcIdx = 0;
    let _currentUc = null;

    function showComparison(uc, idx) {
      _currentUc = uc;
      _currentUcIdx = idx;
      const cmps = uc.comparisons || [];
      const c = cmps[idx];
      if (!c) return;
      const el = document.getElementById('ucDetail');

      let h = '';

      // Page name
      h += `<div style="font-size:0.85rem;font-weight:600;margin-bottom:0.5rem">${esc(c.page)}</div>`;

      // Side-by-side images
      h += '<div class="uc-detail">';

      // Android
      h += '<div class="uc-detail-panel">';
      if (c.android) {
        h += `<img src="/${c.android}" alt="Android" onclick="openLightbox('/${c.android}')">`;
      } else {
        h += '<div class="uc-no-img">' + t('No Android frame') + '</div>';
      }
      h += '<div class="uc-detail-label">Android</div>';
      h += '</div>';

      // HarmonyOS
      h += '<div class="uc-detail-panel">';
      if (c.harmonyos) {
        h += `<img src="/${c.harmonyos}" alt="HarmonyOS" onclick="openLightbox('/${c.harmonyos}')">`;
      } else {
        h += '<div class="uc-no-img">' + t('No HarmonyOS frame') + '</div>';
      }
      h += '<div class="uc-detail-label">HarmonyOS</div>';
      h += '</div>';

      h += '</div>';

      // Info bar
      h += '<div class="uc-detail-info">';
      if (c.similarity != null) {
        const cls = c.similarity >= 85 ? 'high' : c.similarity >= 65 ? 'med' : 'low';
        h += `<span>${t('Similarity')}: <span class="uc-similarity ${cls}">${c.similarity}%</span></span>`;
      }
      const statusLabels = { match: t('Match'), diff: t('Differences'), missing: t('Missing in HarmonyOS'), 'harmonyos-only': t('HarmonyOS Only') };
      h += ` <span style="margin-left:0.8rem;font-size:0.72rem;color:var(--text3)">${statusLabels[c.status] || c.status}</span>`;
      if (c.notes) {
        h += `<div class="uc-notes">${esc(c.notes)}</div>`;
      }
      h += '</div>';

      // Nav
      h += '<div class="uc-nav">';
      h += `<button onclick="navComparison(-1)" ${idx === 0 ? 'disabled' : ''}>&larr; ${t('Prev')}</button>`;
      h += `<span style="font-size:0.72rem;color:var(--text3)">${idx + 1} / ${cmps.length}</span>`;
      h += `<button onclick="navComparison(1)" ${idx === cmps.length - 1 ? 'disabled' : ''}>${t('Next')} &rarr;</button>`;
      h += '</div>';

      el.innerHTML = h;
    }

    function navComparison(dir) {
      if (!_currentUc) return;
      const cmps = _currentUc.comparisons || [];
      const newIdx = Math.max(0, Math.min(cmps.length - 1, _currentUcIdx + dir));
      if (newIdx === _currentUcIdx) return;

      // Update thumbnail active state
      const grid = document.getElementById('ucGrid');
      if (grid) {
        grid.querySelectorAll('.uc-thumb').forEach(t => t.classList.remove('active'));
        const thumb = grid.querySelector(`[data-idx="${newIdx}"]`);
        if (thumb) thumb.classList.add('active');
      }
      showComparison(_currentUc, newIdx);
    }

    function openLightbox(src) {
      const lb = document.createElement('div');
      lb.className = 'uc-lightbox';
      lb.innerHTML = `<img src="${src}">`;
      lb.onclick = () => lb.remove();
      document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { lb.remove(); document.removeEventListener('keydown', handler); }
      });
      document.body.appendChild(lb);
    }

    // ── Feature Tree ──
    function featureTreeSection(ft) {
      if (!ft || !ft.categories || ft.categories.length === 0) return '';
      const s = ft.stats;
      const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
      let h = '<div class="row row-full"><div class="card">';
      h += `<h2>${t('Feature Tree')}</h2>`;

      // ── Layout: left 1/3 stats + right 2/3 tree ──
      h += '<div style="display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap">';

      // ── LEFT PANEL: Statistics (1/3) ──
      h += '<div style="flex:0 0 22%;min-width:180px;max-width:240px">';

      // Big number
      h += `<div style="text-align:center;margin-bottom:0.8rem">`;
      h += `<div style="font-size:2.2rem;font-weight:800;color:var(--green)">${pct}%</div>`;
      h += `<div style="font-size:0.7rem;color:var(--text3)">${s.done} / ${s.total} ${lang === 'zh' ? '功能特性' : 'features'}</div>`;
      h += '</div>';

      // Stacked bar
      const pDone = (s.done / s.total * 100).toFixed(1);
      const pFix = (s.fixing / s.total * 100).toFixed(1);
      const pSkip = (s.notMigrated / s.total * 100).toFixed(1);
      const pBlock = (s.blocked / s.total * 100).toFixed(1);
      h += '<div style="margin-bottom:0.8rem">';
      h += `<div class="ft-bar-track" style="height:10px;border-radius:5px"><div class="ft-bar-seg" style="width:${pDone}%;background:var(--green)"></div><div class="ft-bar-seg" style="width:${pFix}%;background:var(--orange)"></div><div class="ft-bar-seg" style="width:${pSkip}%;background:var(--text3)"></div><div class="ft-bar-seg" style="width:${pBlock}%;background:var(--red)"></div></div>`;
      h += '</div>';

      // Status breakdown
      h += '<div style="font-size:0.7rem;line-height:2">';
      h += `<div style="display:flex;justify-content:space-between"><span><i class="dot" style="background:var(--green);display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px"></i>${lang === 'zh' ? '已完成' : 'Done'}</span><b>${s.done}</b></div>`;
      h += `<div style="display:flex;justify-content:space-between"><span><i class="dot" style="background:var(--orange);display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px"></i>${lang === 'zh' ? '修复中' : 'Fixing'}</span><b>${s.fixing}</b></div>`;
      h += `<div style="display:flex;justify-content:space-between"><span><i class="dot" style="background:var(--text3);display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px"></i>${lang === 'zh' ? '未迁移' : 'Skipped'}</span><b>${s.notMigrated}</b></div>`;
      if (s.blocked > 0) h += `<div style="display:flex;justify-content:space-between"><span><i class="dot" style="background:var(--red);display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px"></i>${lang === 'zh' ? '平台受限' : 'Blocked'}</span><b>${s.blocked}</b></div>`;
      h += '</div>';

      // Category ranking (sorted by completion %)
      h += `<div style="margin-top:0.8rem;border-top:1px solid var(--border);padding-top:0.6rem">`;
      h += `<div style="font-size:0.68rem;font-weight:700;color:var(--text3);margin-bottom:0.4rem">${lang === 'zh' ? '按模块完成度' : 'By Module'}</div>`;
      const sorted = [...ft.categories].sort((a, b) => {
        const pa = a.total > 0 ? a.done / a.total : 0;
        const pb = b.total > 0 ? b.done / b.total : 0;
        return pb - pa;
      });
      sorted.forEach(cat => {
        const cp = cat.total > 0 ? Math.round(cat.done / cat.total * 100) : 0;
        const barColor = cp === 100 ? 'var(--green)' : cp >= 70 ? 'var(--blue)' : cp >= 40 ? 'var(--orange)' : 'var(--red)';
        const shortName = ct(cat.name).replace(/\s*[（(].*$/, '');
        h += '<div style="margin-bottom:3px">';
        h += `<div style="display:flex;justify-content:space-between;font-size:0.62rem;color:var(--text2)"><span>${esc(shortName)}</span><span>${cat.done}/${cat.total}</span></div>`;
        h += `<div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden"><div style="height:100%;width:${cp}%;background:${barColor};border-radius:2px"></div></div>`;
        h += '</div>';
      });
      h += '</div>';

      h += '</div>'; // end left panel

      // ── RIGHT PANEL: Feature Tree (2/3) ──
      h += '<div style="flex:1;min-width:300px">';
      h += '<div class="ft-grid">';
      ft.categories.forEach((cat, ci) => {
        const cp = cat.total > 0 ? Math.round(cat.done / cat.total * 100) : 0;
        h += `<div class="ft-cat" onclick="var d=document.getElementById('ftd${ci}');d.classList.toggle('show');this.querySelector('.ft-cat-arrow').classList.toggle('open')">`;
        h += '<div class="ft-cat-row">';
        h += `<span class="ft-cat-arrow">&#9654;</span>`;
        h += `<span class="ft-cat-name">${esc(ct(cat.name))}</span>`;
        h += `<div class="ft-cat-mini"><div class="ft-cat-mini-fill" style="width:${cp}%"></div></div>`;
        h += `<span class="ft-cat-cnt">${cat.done}/${cat.total}</span>`;
        h += '</div>';

        // Expandable detail: tags flow
        h += `<div class="ft-detail" id="ftd${ci}">`;
        if (cat.features.length > 0) {
          h += '<div class="ft-tags">';
          cat.features.forEach(f => { h += ftTag(f); });
          h += '</div>';
        }
        cat.subs.forEach(sub => {
          h += `<div class="ft-detail-sub">${esc(ct(sub.name))}</div><div class="ft-tags">`;
          sub.features.forEach(f => { h += ftTag(f); });
          h += '</div>';
        });
        h += '</div></div>';
      });
      h += '</div>';
      h += '</div>'; // end right panel

      h += '</div>'; // end flex layout
      h += '</div></div>';
      return h;
    }

    function ftTag(f) {
      return `<span class="ft-tag ${f.status}" title="${esc(f.id)}">${esc(ct(f.name))}</span>`;
    }

    // ── Daily Reports ──
    function dailyReportsSection(reports) {
      let h = '<div class="row row-full"><div class="card dr-section-wrap">';
      h += `<h2>${t('Daily Reports')} (${reports.length})</h2>`;

      // Date navigation
      h += '<div class="dr-nav" id="drNav">';
      reports.forEach((r, i) => {
        h += `<button class="dr-nav-btn ${i === 0 ? 'active' : ''}" data-idx="${i}">${r.date}</button>`;
      });
      h += '</div>';

      // Report content area
      h += '<div id="drContent"></div>';
      h += '</div></div>';
      return h;
    }

    function bindDailyReportEvents(reports) {
      const nav = document.getElementById('drNav');
      if (!nav) return;
      // Show first report
      showDailyReport(reports, 0);

      nav.querySelectorAll('.dr-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          nav.querySelectorAll('.dr-nav-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          showDailyReport(reports, parseInt(btn.dataset.idx));
        });
      });
    }

    function showDailyReport(reports, idx) {
      const r = reports[idx];
      if (!r) return;
      const el = document.getElementById('drContent');

      let h = '<div class="dr-content">';

      // Highlights with "view full report" button inline
      if (r.highlights.length > 0) {
        h += '<div class="dr-section-header"><h3>' + t('Top Highlights') + '</h3>';
        h += '<button class="dr-full-btn" onclick="this.closest(\'.dr-content\').querySelector(\'.dr-full-details\').open=!this.closest(\'.dr-content\').querySelector(\'.dr-full-details\').open">' + t('Show full report') + '</button>';
        h += '</div>';
        r.highlights.forEach(hl => {
          const hlText = ct(hl);
          const tagMatch = hlText.match(/^【(.+?)】/);
          let tag = '', tagCls = '', text = hlText;
          if (tagMatch) {
            const raw = tagMatch[1];
            text = hlText.replace(tagMatch[0], '').trim();
            if (/完[成结]|Complet/i.test(raw)) { tag = raw; tagCls = 'done'; }
            else if (/进行|Progress/i.test(raw)) { tag = raw; tagCls = 'progress'; }
            else if (/启动|Start/i.test(raw)) { tag = raw; tagCls = 'start'; }
            else if (/解决|Resolv/i.test(raw)) { tag = raw; tagCls = 'resolve'; }
            else { tag = raw; tagCls = 'progress'; }
          }
          h += `<div class="dr-highlight">${tag ? '<span class="dr-highlight-tag ' + tagCls + '">' + esc(tag) + '</span>' : ''}${esc(text)}</div>`;
        });
      }

      // Outputs table
      if (r.outputs.length > 0) {
        h += '<h3>' + t('Outputs') + '</h3>';
        h += '<table><thead><tr><th>' + t('Type') + '</th><th>' + t('Count') + '</th><th>' + t('Detail') + '</th></tr></thead><tbody>';
        r.outputs.forEach(o => {
          h += `<tr><td>${esc(ct(o.type))}</td><td>${esc(o.count)}</td><td>${esc(ct(o.desc))}</td></tr>`;
        });
        h += '</tbody></table>';
      }

      // Tomorrow plan
      if (r.plans.length > 0) {
        h += '<h3>' + t('Next Day Plan') + '</h3>';
        r.plans.forEach(p => {
          const icon = p.done ? '<span style="color:var(--green)">&#10003;</span>' : '<span style="color:var(--text3)">&#9675;</span>';
          h += `<div style="display:flex;align-items:center;gap:0.4rem;padding:0.2rem 0">${icon}<span>${esc(ct(p.text))}</span></div>`;
        });
      }

      // Full content (collapsible) — no summary text, toggled by button above
      h += '<details class="dr-full-details"><summary style="display:none"></summary>';
      h += '<div class="dr-full-content">' + esc(r.content) + '</div>';
      h += '</details>';

      h += '</div>';
      el.innerHTML = h;
    }

    // ── Track analytics ──
    try {
      fetch('/api/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'page', page: location.pathname }),
      });
    } catch {}

    // Boot
    init();
  </script>
</body>
</html>
